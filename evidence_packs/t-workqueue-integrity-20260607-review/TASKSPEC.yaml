    - powershell -ExecutionPolicy Bypass -File scripts/Test-WorkQueue.ps1
  conditional_commands:
    - powershell -ExecutionPolicy Bypass -File scripts/Run-WorkQueue.ps1 -QueueFile agent-workqueue/local-quality.queue.json
    - powershell -ExecutionPolicy Bypass -File scripts/Run-Batch.ps1 -TaskFile scripts/examples/batch-local-quality.json
  expected_positive:
