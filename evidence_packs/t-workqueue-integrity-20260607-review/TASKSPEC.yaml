implementation_plan:
  - Read the active queue JSONs, WorkQueue docs, and root-cause notes first.
  - Preferred convergence decision: restore `scripts/examples/batch-local-quality.json` as an active current-repo batch, instead of leaving four queues and multiple docs pointed at a missing file.
  - Make the restored active batch match this repository's current reality; do not copy the future-only batch verbatim if it depends on non-existent `src/`, `tasks.yaml`, or unavailable external commands.
  - Make queue files, self-test, and docs tell one consistent story.
  - Initialize evidence with go_evidence.py init.
  - Run WorkQueue self-test and any focused queue/batch checks needed.
  - Write test-output.md with command, exit code, and verdict summaries.
  - Do not write reviewer artifacts.

verification:
