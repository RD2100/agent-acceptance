task_id: REAL-PAPER-C4-SECTION1-STRUCTURAL-PILOT-A1
paper_project_type: journal_article
paper_title: "教育强国战略下高等教育提质扩容的必然逻辑、内在张力与治理进路"
paper_keywords: ["教育强国","高等教育","提质扩容","内在张力","治理进路"]
paper_structure: ["一、高等教育提质扩容的必然逻辑","二、高等教育提质扩容的内在张力","三、高等教育提质扩容的平衡之道","四、协同治理进路"]
target_section_name: "高等教育提质扩容的必然逻辑"
section_purpose: "从应然逻辑、实然困境和质量旨归三个维度论证教育强国战略下高等教育提质扩容的历史必然性"
core_claim: "教育强国战略对高等教育提出了提质与扩容的双重要求，提质是扩容的根本旨归，扩容为提质提供规模基础，二者相辅相成、协同推进"
argument_outline: |
  1) 应然之需：教育强国战略从"强"与"全"两个维度对高等教育提出"提质+扩容"的双重规定
  2) 实然之困：规模扩张必须与质量提升相统一，单纯追求规模而忽视质量会产生低效发展
  3) 质量旨归：质量是规模扩张的根本目的——从人才选拔、办学改革、经济社会发展三个角度论证
known_problems: |
  1) 三个子论点之间的逻辑递进关系不够清晰——"应然→实然→质量旨归"的论证链条在"实然"部分转向了风险描述而非正向论证
  2) 引用文献较旧（主要引用2019-2024年政策文件），缺乏国际比较视角的最新研究
  3) 第二小节"实然之困"的篇幅比重过大（约占全文1/3），与前后两小节的论证比例失衡
  4) 核心概念"提质扩容"在政策话语与学术话语之间的转换不够充分——直接使用了政策术语但未做学理化界定
desired_output: "优化三段论结构，平衡各小节篇幅，补充国际比较文献，加强核心概念的学理化界定"
