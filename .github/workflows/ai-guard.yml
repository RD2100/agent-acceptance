name: AI Guard

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ai-guard:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Deny Paths + Scope + Secret Scan
        run: python tools/ai_guard.py full

      - name: Reviewer Evidence Validation
        run: powershell -ExecutionPolicy Bypass -File scripts/Test-ReviewerEvidence.ps1

      - name: Governance Drift Check
        run: powershell -ExecutionPolicy Bypass -File scripts/Test-GovernanceDrift.ps1

      - name: Governance Gate (blocking)
        run: powershell -ExecutionPolicy Bypass -File scripts/Test-Governance.ps1 -Mode blocking
