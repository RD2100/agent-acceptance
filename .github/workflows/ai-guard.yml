name: AI Guard

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  ai-guard:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: AI Guard — Deny Paths + Scope + Secret Scan
        run: python tools/ai_guard.py full

      - name: Secret Scan (GitHub native)
        if: always()
        uses: actions/secret-scanning-action@v1