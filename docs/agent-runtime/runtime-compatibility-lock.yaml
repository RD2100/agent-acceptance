compatibility_lock_version: "1.0.0"

runtime:
  id: "agent-acceptance"
  version: "2.0.0"
  canonical_root: "D:\\agent-acceptance"

accepted_contract_versions:
  TaskSpec: ["1.0.0"]
  RunSpec: ["1.0.0"]
  EvidenceIndex: ["1.0.0"]
  GateResult: ["1.0.0"]
  ExecutionReport: ["1.0.0"]
  SkillIntakeRecord: ["1.0.0"]
  ToolRiskRecord: ["1.0.0"]
  MemoryUpdateRecord: ["1.0.0"]

accepted_frames:
  dev-frame:
    manifest_path: "D:\\dev-frame\\frame-manifest.yaml"
    accepted_frame_versions: ["0.3.0"]
    max_access: "read_only"
    execution_policy: "forbidden"
    allowed_producers:
      RunSpec: "candidate_only"
      EvidenceIndex: "historical_only"
      GateResult: "forbidden"

  test-frame:
    manifest_path: "D:\\test-frame\\frame-manifest.yaml"
    accepted_frame_versions: ["0.2.0"]
    max_access: "read_only"
    execution_policy: "forbidden"
    allowed_producers:
      EvidenceIndex: "historical_observation_only"
      GateResult: "forbidden"

authority_matrix:
  TaskSpec:
    agent-acceptance: "produce"
    dev-frame: "forbidden"
    test-frame: "forbidden"
  RunSpec:
    agent-acceptance: "produce_consume"
    dev-frame: "candidate_only"
    test-frame: "forbidden"
  EvidenceIndex:
    agent-acceptance: "produce_consume"
    dev-frame: "historical_only"
    test-frame: "historical_observation_only"
    attribution: "observation_only"
  GateResult:
    agent-acceptance: "produce"
    dev-frame: "forbidden"
    test-frame: "forbidden"
    attribution: "forbidden"
  ExecutionReport:
    agent-acceptance: "produce"
    dev-frame: "forbidden"
    test-frame: "forbidden"

path_drift_rules:
  known_aliases:
    "D:\\devFrame": "D:\\dev-frame"
  scan_on_gate0: true
  unregistered_absolute_path: "WARNING"
  deprecated_path_found: "BLOCKED"

freshness_policy:
  historical_evidence_cannot_be_current: true
  verified_requires_approved_run_or_reviewer: true
  default_freshness_for_existing_artifact: "historical"

gate0_preflight:
  required: true
  check_order:
    - "manifest_exists"
    - "manifest_schema_valid"
    - "frame_version_accepted"
    - "contract_version_compatible"
    - "permission_boundary_check"
    - "evidence_freshness_check"
    - "path_drift_scan"
  effective_policy_rule: "most_restrictive(lock, manifest, task_spec, human_gate)"
