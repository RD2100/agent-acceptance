task_id: CONTEXT-COMPRESSION-A1
title: Build long-conversation context compression layer
priority: P1
status: in_progress
mode: "@go edit"
whole_dirty_worktree_allowed: false
external_upload_allowed: false
raw_transcript_allowed: false
real_paper_text_allowed: false
description: >
  Establish a cold-start context layer so new agent/GPT sessions no longer rely
  on rereading large PROJECT_HISTORY/HANDOFF documents every time.

goal:
  user_visible_success: >
    The repository gains a short boot context plus memory index path that can
    support fresh sessions without loading the full long conversation history.
  in_scope:
    - Define BOOT_CONTEXT and memory-index generation path
    - Keep PROJECT_HISTORY as long-lived truth source, not per-turn injection payload
    - Add machine-checkable guardrails preventing raw paper/private text/transcript ingress
    - Add tests for compression/output boundaries
  out_of_scope:
    - Real paper processing
    - Browser/GPT queue redesign
    - WorkQueue execution changes

gate_0:
  triggered: true
  inventory_evidence:
    queried_sources:
      - PROJECT_HISTORY.md
      - docs/workflow-memory-compiler.md
      - scripts/memory_compiler.py
      - evidence_packs/paper-c2-closure/GPT_REVIEW_RESULT.txt
      - current dirty-worktree split history
    matched_capabilities:
      - memory_compilation
      - workflow_memory
      - privacy_boundary
    compared_against_request:
      - "long conversation compression and cold-start boot context"
  sufficiency_decision: new_delta_required
  decision: build_delta

