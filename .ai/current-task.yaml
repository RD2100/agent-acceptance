task_id: GOVERNANCE-READINESS-CONSOLIDATION-A1
title: "Consolidate governance sources, schema, tests, and capability scope"
priority: P1
status: in_progress
type: consolidation
mode: "@go review"

description: >
  Single consolidation batch resolving governance source drift, TaskSpec schema
  parity, pre-existing test failures, and capability scope classification.
  No real dispatch, plugin installation, or paper workflow in scope.

goal:
  user_visible_success: >
    All governance sources consistent, schema status enum parity achieved,
    full test suite green, minimum capability set defined with correct
    per-mode semantics. Ready for independent review.
  in_scope:
    - Sync verify-matrix.yaml VM-004 to mode-based threshold (local_governance PASS, controlled_pilot GAP)
    - Update risk-register.yaml RR-001/004/005 status
    - Define minimum capability set (local_governance / controlled_pilot / optional)
    - Expand task-spec.schema.json status enum from 4 to 9 values
    - Sync multi-agent-dispatch-plan.schema.json embedded enum
    - Fix pre-existing test failures (router + health + advisory staleness)
    - Add governance consistency tests
    - Full pytest green + git diff --check clean
  out_of_scope:
    - opencode run or external runtime invocation
    - Real multi-agent dispatch
    - Plugin installation (codex plugins)
    - Paper workflow execution
    - Git push or remote operations
    - Human authorization (separate step)
    - Full JSON Schema validation of all TaskSpec fields (only status enum parity guaranteed)

write_set:
  - ".ai/current-task.yaml"
  - ".ai/risk-register.yaml"
  - ".ai/verify-matrix.yaml"
  - ".ai/tasks/governance-readiness-consolidation-a1.yaml"
  - "schemas/agent-runtime/task-spec.schema.json"
  - "schemas/agent-runtime/multi-agent-dispatch-plan.schema.json"
  - "tests/test_router_10_project_stress.py"
  - "tests/test_startup_conversation_health_check.py"
  - "tests/test_pre_gpt_gate.py"
  - "tests/test_pre_commit_health_advisory.py"
  - "tests/test_governance_consistency.py"
  - "docs/agent-runtime/minimum-capability-set.md"
  - "_reports/THREE-STEP-CLOSURE-REPORT.md"
  - "_reports/governance-readiness-consolidation-a1/**"
  - "_reports/LOCAL-GOVERNANCE-READINESS-REPORT.md"
  - "_reports/multi-agent-dispatch-plan-a1/**"
  - "_reports/multi-agent-architecture-review-a1/**"
  - "_reports/multi-agent-verifier-a1/**"
  - "_reports/multi-agent-quality-review-a1/**"
  - "_reports/multi-agent-multi-gpt-pilot-a1/**"
  - "docs/governance/PROGRESS_LOG.md"
  - "docs/governance/VERIFY_MATRIX.md"
  - "docs/governance/HANDOFF.md"
  - "_evidence/EVIDENCE-CHAIN-ARCHIVE.md"
  - "hooks/sealed-files-manifest.json"
  - "_evidence/hook-output/**"

gate_0:
  triggered: true
  trigger_reason: "P1 consolidation: governance sources, schema, tests, capability scope, readiness report"
  inventory_evidence:
    queried_sources:
      - ".ai/verify-matrix.yaml"
      - ".ai/risk-register.yaml"
      - "docs/agent-runtime/capability-inventory.md"
      - "schemas/agent-runtime/task-spec.schema.json"
      - "_reports/THREE-STEP-CLOSURE-REPORT.md"
    matched_capabilities:
      - governance_document_review
      - schema_validation
      - capability_passport_management
  rules_checked: [core-003, core-008]
  sufficiency_decision: existing_sufficient
  decision: reuse
  delta_justification: "Consolidation of existing artifacts. No new capabilities needed."

deny_paths:
  - "scripts/multi_project_router.py"
  - "scripts/dry_run_dispatch_10.py"
  - "scripts/tab_target_resolver.py"
  - ".agent/PROJECT_REGISTRY.json"
  - "scripts/check_handoff_needed.py"
  - "scripts/startup_conversation_health_check.py"

rollback_conditions:
  - Any test regression beyond the pre-existing failures
  - Schema change breaks existing TaskSpec status validation
  - Governance source inconsistency increases rather than decreases

live_dispatch_authorized: false
next_recommended: "Human review of consolidation results"
