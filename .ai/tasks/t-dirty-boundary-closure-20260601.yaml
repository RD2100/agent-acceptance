task_id: t-dirty-boundary-closure-20260601
title: Close ownership of current dirty governance boundary
priority: P1
status: deferred
closeout_reason: "Requires live execution context"
mode: "@go edit"
description: >
  Remove the direct blocker for rerunning the required guard by resolving the
  ownership and disposition of the current six no-touch dirty governance files
  only. Do not mix reviewer-evidence logic into this batch.

goal:
  user_visible_success: >
    The six target files are no longer unowned dirty changes, and the remaining
    worktree dirt is explicitly classified as owned sidecar items or generated
    artifacts instead of blocking the next guard rerun.
  in_scope:
    - Inspect and decide keep, fix, archive, or defer for each target file
    - Make the smallest edits needed to close ownership on those six files
    - Record sidecar dirty items that are not in this batch scope
    - Produce run evidence under runs/t-dirty-boundary-closure-20260601/
  out_of_scope:
    - Any reviewer-evidence logic change
    - Any write to tools/ai_guard.py or tools/go_evidence.py
    - Any edit under .github/, hooks/, or rules/
    - Any broad Blackboard follow-up outside the six target files

constraints:
  token_strategy:
    - Reuse current git diff and existing audit/report files
    - Keep this batch limited to dirty-boundary closure only
    - Prefer classification and minimal edits over rewrite
  hard_stops:
    - No fake green
    - No writes outside allow_write
    - Do not expand into Batch 3 or Batch 4 work
    - Executor/fixer must not create review.md or review.yaml
    - Final pass requires reviewer evidence for this batch

target_files:
  - archive/draft-hooks/pre-final.audit.ps1
  - archive/draft-hooks/pre-task.audit.ps1
  - archive/draft-hooks/pre-tool.audit.ps1
  - docs/agent-runtime/capability-inventory.md
  - docs/agent-runtime/routing-matrix-summary.md
  - audit/blackboard-cleanup-audit-20260531.md

expected_disposition:
  - archive/draft-hooks/pre-final.audit.ps1: fix
  - archive/draft-hooks/pre-task.audit.ps1: keep
  - archive/draft-hooks/pre-tool.audit.ps1: keep
  - docs/agent-runtime/capability-inventory.md: fix
  - docs/agent-runtime/routing-matrix-summary.md: keep
  - audit/blackboard-cleanup-audit-20260531.md: archive

sidecar_dirty_items:
