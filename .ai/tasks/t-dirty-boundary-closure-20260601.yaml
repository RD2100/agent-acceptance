implementation_plan:
  - Read the six target files and their diffs before editing.
  - Confirm a keep, fix, archive, or defer disposition for each target file.
  - Apply only the smallest changes needed to make the six files owned and intentional.
  - Capture sidecar dirty items and generated artifacts in test-output.md.
  - Do not edit tools/ai_guard.py, tools/go_evidence.py, .github/, hooks/, or rules/.

verification:
  required_commands:
    - git status --short
    - git diff -- archive/draft-hooks/pre-final.audit.ps1 archive/draft-hooks/pre-task.audit.ps1 archive/draft-hooks/pre-tool.audit.ps1 docs/agent-runtime/capability-inventory.md docs/agent-runtime/routing-matrix-summary.md audit/blackboard-cleanup-audit-20260531.md
    - rg -n "blackboard|mcp__blackboard|bb_solidify|bb_share_knowledge" archive/draft-hooks docs/agent-runtime audit/blackboard-cleanup-audit-20260531.md
  expected_result:
    - The six target files are no longer unowned dirty changes
    - Remaining dirty items are explicitly classified as owned or generated
    - No new governance files are added to the dirty set

acceptance_criteria:
  - Each target file receives a final keep, fix, archive, or defer disposition
  - The six target files no longer block follow-up work as ownerless dirty changes
  - No file outside allow_write is modified
  - test-output.md records command, exit code, and verdict summaries
  - The batch report states residual risk and next handoff point for Batch 3

reviewer_requirements:
  - Reviewer must be a separate role/session from executor
  - Reviewer must read diff.patch, test-output.md, safety-report.json, and chain-evidence.json
  - Reviewer must confirm the six-file disposition list is consistent with the diff
  - Reviewer must create review.md and review.yaml
  - Finalizer must run python tools/go_evidence.py finalize on the run evidence directory
