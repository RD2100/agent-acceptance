task_id: EVIDENCE-CAPTURE-STANDARD-A2
title: Evidence Capture Standard — canonical evidence pack contract & builder enforcement
priority: P0
status: in_progress
mode: "@go edit"
whole_dirty_worktree_allowed: false
external_upload_allowed: false
raw_transcript_allowed: false
real_paper_text_allowed: false
description: >
  Define and enforce a canonical evidence pack contract by adding
  evidence-manifest generation, top-level verdict eligibility, evidence
  completeness classification, runtime evidence indexing, and deterministic
  builder validation. Absorb A3/A4 limitations into a unified standard.

goal:
  user_visible_success: >
    Evidence Capture Standard documentation exists and is enforced by the
    builder. evidence-manifest.json is generated per schema. review.yaml
    includes top-level verdict_eligibility and evidence_completeness.
    Runtime evidence uses standardized headers with machine-readable index.
    Full regression claims require included logs. Tests cover positive and
    negative validation paths.
  in_scope:
    - Create docs/agent-runtime/evidence-capture-standard.md
    - Create docs/agent-runtime/evidence-pack-review-rules.md
    - Create schemas/agent-runtime/evidence-manifest.schema.json
    - Create schemas/agent-runtime/runtime-evidence-index.schema.json
    - build_evidence_pack.py generates evidence-manifest.json
    - review.yaml gets top-level verdict_eligibility and evidence_completeness
    - build_evidence_pack.py supports required/optional/not_applicable/missing
    - builder distinguishes full_regression / targeted_tests / no_test_rationale
    - runtime evidence .txt header standard + runtime-evidence-index.json
    - consistency_check.all_files_agree computed from actual data
    - build_evidence_pack.py supports --head parameter
    - validate_evidence_pack_contract() function for testing
    - tests for positive and negative eligibility paths
    - runtime negative-path evidence
    - create evidence pack for GPT review
  out_of_scope:
    - Do not rewrite old accepted evidence packs
    - Do not change Conversation Health Gate A1-A4 semantics
    - Do not implement live dispatch enforcement
    - Do not build a large new framework
    - Do not replace all existing review scripts
    - Do not make reviewer verdicts automatic
    - Do not change SADP protocol text
    - Do not modify evidence_pack_linter.py
    - Do not migrate SADP 0.R.2 review schema
    - Do not modify historical review.yaml files

gate_0:
  triggered: true
  inventory_evidence:
    queried_sources:
      - scripts/build_evidence_pack.py (1264 lines, 8 phases)
      - docs/agent-runtime/evidence-pack-standard.md (9 required files, 9 rules)
      - docs/agent-runtime/sub-agent-dispatch-protocol.md (0.R.2 schema)
      - schemas/agent-runtime/evidence-index.schema.json (unused by builder)
      - schemas/agent-runtime/evidence-capture.schema.json (hook output)
      - docs/agent-runtime/universal-agent-workflow-standard.md
      - docs/agent-runtime/pre-gpt-review-gate.md
      - A3/A4 evidence pack ZIPs and verdict limitations
    matched_capabilities:
      - documentation_authoring
      - evidence_pack_builder
      - governance_standard_design
      - pytest_test_generation
    compared_against_request:
      - "ECS-A2 from GPT R1+R2 review (2 iterations)"
    gaps_identified:
      - "No evidence-manifest.json or machine-readable manifest"
      - "verdict_eligibility only nested, no top-level aggregation"
      - "Top-level verdict only reflects test pass/fail"
      - "No required/optional/missing file classification"
      - "No full_regression vs targeted_tests distinction"
      - "evidence-capture-standard.md does not exist"
      - "evidence-pack-review-rules.md does not exist"
      - "Required files list varies (7/9/10/11)"
      - "evidence-index.schema.json unused by builder"
      - "Zero functional tests for build_evidence_pack.py"
      - "consistency_check.all_files_agree hardcoded true"
  sufficiency_decision: new_delta_required
  decision: build_delta
  gpt_review_rounds: 2
  gpt_r1_file: "_evidence/EVIDENCE-CAPTURE-STANDARD-A2/gpt_review_r1.txt"
  gpt_r2_file: "_evidence/EVIDENCE-CAPTURE-STANDARD-A2/gpt_review_r2.txt"
  gpt_authorization: authorized_execute_immediately
  gpt_required_adjustments:
    - "runtime-evidence-index.schema.json mandatory not optional"
    - "consistency_check.all_files_agree must not be hardcoded true"
    - "missing review/final-report tests use contract validation functions"
    - "stale_extra_evidence_detected needs deterministic rules"
    - "--head must affect manifest, diff, git-show, commit_chain"

write_set:
  - ".ai/tasks/evidence-capture-standard-a2.yaml"
  - ".ai/tasks/evidence-capture-standard-a1.yaml"
  - ".ai/current-task.yaml"
  - "docs/agent-runtime/evidence-capture-standard.md"
  - "docs/agent-runtime/evidence-pack-review-rules.md"
  - "schemas/agent-runtime/evidence-manifest.schema.json"
  - "schemas/agent-runtime/runtime-evidence-index.schema.json"
  - "scripts/build_evidence_pack.py"
  - "tests/test_evidence_capture_standard.py"
  - "_evidence/EVIDENCE-CAPTURE-STANDARD-A2/**"
  - "hooks/sealed-files-manifest.json"

deny_paths:
  - "scripts/pre_commit_*.py"
  - "scripts/check_handoff_needed.py"
  - "scripts/startup_conversation_health_check.py"
  - "scripts/validate_hook_output.py"
  - "scripts/ai_guard.py"
  - "scripts/evidence_pack_linter.py"
  - "hooks/pre-commit.governance.ps1"
  - "docs/agent-runtime/sub-agent-dispatch-protocol.md"
  - "docs/agent-runtime/startup-read-gate.md"
  - "tests/test_hook_failure_semantics.py"
  - "tests/test_startup_conversation_health_check.py"
  - "tests/test_pre_gpt_review_gate.py"

constraints:
  - "modified_tracked must be 0 after final commit"
  - "No regression in A1-A4 Conversation Health Gate behavior"
  - "No regression in existing 1204 tests"
  - "Builder must remain stdlib-only (no new dependencies)"
  - "evidence-manifest.json must be valid JSON per evidence-manifest.schema.json"
  - "verdict_eligibility rules must be deterministic (no AI judgment)"
  - "Runtime evidence scenario format backward-compatible with existing .txt"
  - "All new tests must pass with pytest -x"
  - "consistency_check.all_files_agree computed not hardcoded"
  - "--head affects manifest, diff, git-show, commit_chain, runtime index"
  - "stale evidence uses deterministic rules (Code version, generated_at, index reference)"

acceptance_criteria:
  - "docs/agent-runtime/evidence-capture-standard.md exists"
  - "docs/agent-runtime/evidence-pack-review-rules.md exists"
  - "schemas/agent-runtime/evidence-manifest.schema.json exists"
  - "schemas/agent-runtime/runtime-evidence-index.schema.json exists"
  - "build_evidence_pack.py generates evidence-manifest.json"
  - "review.yaml includes top-level verdict_eligibility block"
  - "review.yaml includes evidence_completeness block (tier_0/1/2)"
  - "review.yaml distinguishes full_regression vs targeted_tests"
  - "Missing Tier 0 files sets verdict_eligibility needs_more_evidence"
  - "Runtime claim without artifact sets eligible_with_limitations"
  - "modified_tracked > 0 blocks clean eligibility"
  - "consistency_check.all_files_agree is computed"
  - "validate_evidence_pack_contract() exists and is testable"
  - "Tests cover positive and negative validation paths"
  - "Runtime negative-path evidence included in pack"
  - "modified_tracked is 0 after commit"
  - "All 1204+ existing tests pass"
