task_id: WORKSPACE-CLOSURE-INVENTORY-A1
title: "Read-only workspace untracked file inventory"
priority: P1
status: closed
closeout_reason: "Phase 3 cleanup superseded; inventory completed (commit 1e6b4f6e)"
type: audit
mode: "@go edit"
description: >
  Generate a structured inventory of all ~202 untracked files in the workspace root.
  Strictly read-only: no deletions, no moves, no archives, no commits of untracked files.
  Output: classification + suggested action + risk level for each file.

goal:
  user_visible_success: >
    A complete inventory covering all untracked files with classification,
    suggested action, and risk assessment, ready for human review before
    any cleanup actions.
  in_scope:
    - Scan all untracked files via git status --porcelain
    - Classify each file into categories
    - Check evidence directory vs ZIP coverage
    - Assign suggested action (KEEP/COMMIT/ARCHIVE/DISCARD)
    - Assign risk level (LOW/MEDIUM/HIGH)
    - Output structured inventory document
  out_of_scope:
    - No file deletions
    - No file moves or renames
    - No archives
    - No git add or commit of untracked files
    - No policy changes

write_set:
  - ".ai/current-task.yaml"
  - ".ai/tasks/workspace-closure-inventory-a1.yaml"
  - "_reports/workspace-closure-inventory-a1/**"
  - "hooks/sealed-files-manifest.json"

deny_paths:
  - "scripts/multi_project_router.py"
  - "scripts/dry_run_dispatch_10.py"
  - "scripts/tab_target_resolver.py"
  - "scripts/ai_guard.py"
  - "hooks/pre-commit.governance.ps1"
  - ".agent/PROJECT_REGISTRY.json"

constraints:
  - "Strictly read-only on untracked files"
  - "No modifications to any untracked file"
  - "Inventory must cover 100% of untracked entries"
  - "Each entry must have: path, category, action, risk, has_zip, notes"

gate_0:
  inventory_evidence:
    queried_sources:
      - "git status --porcelain (202 untracked entries)"
      - "_evidence/ directory (38 subdirs, 34 ZIPs)"
      - "deferred-files-register.yaml (187 entries from ECS-A2)"
    matched_capabilities:
      - "Evidence pack ZIP coverage checker"
      - "Deferred files register cross-reference"
  startup_read: completed
  pre_task_gate: passed

acceptance_criteria:
  - "Inventory covers all 202 untracked entries"
  - "Each entry has: path, category, suggested_action, risk, has_zip, notes"
  - "Categories are exhaustive and non-overlapping"
  - "No file is deleted, moved, or modified"
  - "Inventory document is committed to git"

live_dispatch_authorized: false
next_recommended: "Batch cleanup per inventory (Phase 3, multiple TaskSpecs)"
