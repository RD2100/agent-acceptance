goal: >
  Implement CONVERSATION-HEALTH-GATE A1: minimal viable closed-loop for
  proactive conversation health enforcement. Four deliverables:
  1. Data layer: conversation-health schema + decision schema + policy YAML + current.json example
  2. Decision engine: upgrade check_handoff_needed.py with --input --write --fail-on-force --mode --composite
  3. Pre-Task integration: sadp_pre_task_enforcer.py reads current.json, FORCE_HANDOFF blocks task start
  4. Evidence Pack integration: build_evidence_pack.py requires conversation-health/latest.json
  A1 does NOT implement Pre-GPT wrapper or pre-commit advisory (those are A2/A3).

