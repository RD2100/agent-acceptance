    - powershell -ExecutionPolicy Bypass -File scripts/Test-ReviewerEvidence.ps1
    - powershell -ExecutionPolicy Bypass -File scripts\Test-WorkQueue.ps1
  conditional_commands:
    - powershell -ExecutionPolicy Bypass -File scripts\sadp-audit.ps1
    - powershell -ExecutionPolicy Bypass -File hooks\pre-commit.governance.ps1
  expected_positive:
    - governance files form a coherent module-level story
    - blackboard cleanup references are either intentionally removed or consistently documented
    - runtime evidence hardening remains valid after convergence
  expected_negative:
    - if unrelated dirty-state or policy blockers remain, batch must be reported blocked instead of pass

acceptance_criteria:
  - Current dirty governance files are reconciled into one consistent module
  - capability-inventory and routing-matrix no longer contradict the intended Blackboard policy
  - draft hooks no longer contain stale Blackboard patterns inconsistent with the chosen policy
  - audit/blackboard-cleanup-audit-20260531.md matches actual current disk state or is explicitly corrected
  - chain-evidence schema/tool changes are aligned with runtime validation
  - A dedicated run evidence directory exists under runs/t-governance-convergence-20260601/
  - The executor reports exact residual blockers if the module cannot reach pass

