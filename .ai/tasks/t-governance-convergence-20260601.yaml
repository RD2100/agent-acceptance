implementation_plan:
  - Read the current dirty diffs and supporting audit/completeness reports first.
  - Decide the final module position for Blackboard cleanup across inventory, routing, draft hooks, and audit report.
  - Keep or refine chain-evidence runtime/schema changes only if they fit the converged module.
  - Initialize module evidence with go_evidence.py init.
  - Run the narrowest meaningful validations, then broader governance checks if the module reaches a coherent state.
  - Write test-output.md with command, exit code, and verdict summaries.
  - Do not write reviewer artifacts.

verification:
