task_id: t-governance-convergence-20260601
title: Converge in-flight governance and blackboard cleanup module
priority: P0
status: deferred
closeout_reason: "Phase 4 scope"
mode: "@go edit"
description: >
  Resolve the current in-flight governance module as a coherent batch instead of
  piecemeal fixes. This batch owns the existing dirty governance files, aligns
  blackboard cleanup changes with runtime/evidence changes, and restores a
  consistent project-completeness baseline.

goal:
  user_visible_success: >
    The current dirty governance/blackboard cleanup worktree becomes a coherent,
    reviewable module with explicit evidence, updated docs/inventory consistency,
    and runnable validation gates.
  in_scope:
    - Reconcile current dirty governance files into one consistent batch
    - Decide and implement the final Blackboard cleanup position across inventory, routing, and draft hooks
    - Keep chain-evidence runtime hardening and schema updates aligned with the module
    - Reduce ambiguous dirty state by converting it into a formally reviewed @go batch
    - Produce a dedicated run evidence directory for this module
  out_of_scope:
    - Commit, push, merge, or destructive git cleanup
    - External project bootstrap testing
    - CodeGraph activation if blocked by phase policy
    - 100+ skill classification backlog
    - New external identity/signing infrastructure

constraints:
  token_strategy:
    - Planner stays lean; worker does the heavy lifting
    - Prefer one coherent batch over multiple micro-fixes
    - Reuse existing reports and current diffs as source of truth
  hard_stops:
