  conflict_level: low

review_instructions:
  required_inputs:
    - diff.patch
    - test-output.md
    - safety-report.json
    - chain-evidence.json
  fixed_facts:
    - this batch must not change implementation code
    - reviewer must decide whether Batch 1 stays blocked or can be promoted to pass
    - if still blocked, reviewer must classify the blocker as TaskSpec boundary or new dirty change
  required_verdict: pass_or_blocked

acceptance_criteria:
  - review.md exists and explains whether Batch 1 can be promoted to pass
  - review.yaml exists with reviewer_role reviewer
  - review.yaml reviewer_id differs from executor_id
  - review.yaml reviewed_inputs lists diff.patch, test-output.md, safety-report.json, chain-evidence.json
  - review.yaml verdict is pass or blocked only
  - no file outside allow_write is modified
