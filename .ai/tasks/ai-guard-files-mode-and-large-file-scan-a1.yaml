task_id: AI-GUARD-FILES-MODE-AND-LARGE-FILE-SCAN-A1
title: "Fix P1: --files mode ignored, large file secret scan skipped"
priority: P1
status: completed
type: fix
mode: "@go edit"
description: >
  Fix two P1 governance bugs in tools/ai_guard.py identified by Codex review.
  P1 #1: main() silently ignores --files flag, falls through to full git-diff scan.
  P1 #2: scan_secrets() skips files >1MB via hardcoded size limit.

